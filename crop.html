<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>💬 Agriculture Chatbot</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            background:#0b1220;
            color:white;
            font-family:Arial;
        }
        .container {
            width:70%;
            margin:auto;
            margin-top:40px;
        }
        input {
            width:100%;
            padding:14px;
            font-size:16px;
            border-radius:6px;
            border:none;
        }
        button {
            margin-top:12px;
            width:100%;
            padding:14px;
            background:#29b6f6;
            border:none;
            font-size:18px;
            cursor:pointer;
            border-radius:6px;
        }
        button:hover {
            background:#0288d1;
            color:white;
        }
        #chat-response {
            margin-top:20px;
            padding:15px;
            background:#111827;
            border-radius:6px;
            min-height:60px;
        }
        nav {
            text-align:center;
            margin-bottom:20px;
        }
        nav a {
            color:#4fc3f7;
            margin:0 15px;
            text-decoration:none;
            font-size:18px;
        }
        .voice-buttons {
            display:flex;
            gap:10px;
            margin-top:10px;
        }
        .voice-buttons button {
            width:50%;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- NAVIGATION -->
    <nav>
      <a href="index.html">Home</a>
      <a href="crop.html">Crop</a>
      <a href="fertilizer.html">Fertilizer</a>
      <a href="chatbot.html">Chatbot</a>
    </nav>

    <h1>💬 Agriculture Chatbot</h1>

    <!-- INPUT -->
    <input id="chat-input"
           placeholder="Ask in English or Tamil (தமிழ் / English)">

    <!-- VOICE BUTTONS -->
    <div class="voice-buttons">
        <button onclick="startVoice('en-US')">🎤 Speak English</button>
        <button onclick="startVoice('ta-IN')">🎤 தமிழ் பேசுங்கள்</button>
    </div>

    <!-- ASK BUTTON -->
    <button onclick="askChatbot()">Ask AgriMind</button>

    <!-- RESPONSE -->
    <div id="chat-response"></div>
</div>

<script src="js/chatbot.js"></script>
</body>
</html>
